name: CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master]

jobs:
  kali-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kali-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  kali-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kali-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kali-web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-i18n.mjs

  kali-shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kali-shell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kali-shell/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npx tsc -p tsconfig.preload.json --noEmit
