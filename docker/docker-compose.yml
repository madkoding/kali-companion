# =============================================================================
# Kali — Docker Compose (recomendado)
# =============================================================================
#
# Uso:
#   cp docker/.env.example .env
#   $EDITOR .env
#   docker compose up -d
#
# Con GPU:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# El .env controla qué motores TTS y STT se usan.
# =============================================================================

services:
  kali:
    image: kali:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: kali
    restart: unless-stopped

    ports:
      - "${KALI_PORT:-8900}:8900"   # kali-core WebSocket + HTTP API
      - "${KALI_WEB_PORT:-8080}:8080"  # nginx (kali-web frontend)

    volumes:
      # Modelos (Piper .onnx, Vosk, Qwen3 .gguf) — carpeta del host para persistencia
      - ${HOME}/.local/share/kali/models:/app/models

      # Datos persistentes (SQLite sessions, ai_config.json, snapshots, imágenes)
      - kali-data:/app/data

      # Audio: PulseAudio socket (para compartir audio con el host)
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse

    environment:
      # ── Core ──
      - KALI_PORT=${KALI_PORT:-8900}
      - KALI_HOST=0.0.0.0

      # ── TTS Engine ──
      - KALI_TTS_PROVIDER=${KALI_TTS_PROVIDER:-inproc}
      - KALI_TTS_VOICE=${KALI_TTS_VOICE:-glados-es}
      - KALI_TTS_MODE=${KALI_TTS_MODE:-normal}
      - KALI_TTS_ENABLED=${KALI_TTS_ENABLED:-false}
      - KALI_TTS_MODELS_DIR=/app/models

      # ── STT Engine ──
      - KALI_STT_PROVIDER=${KALI_STT_PROVIDER:-vosk}
      - KALI_STT_MODEL=${KALI_STT_MODEL:-vosk-model-small-es-0.42}
      - KALI_STT_MODEL_EN=${KALI_STT_MODEL_EN:-vosk-model-small-en-us-0.15}
      - KALI_STT_LANGUAGE=${KALI_STT_LANGUAGE:-es}
      - KALI_STT_MODELS_DIR=/app/models/vosk
      - KALI_VOICES_DIR=/app/models/piper-voices

      # ── Qwen3-TTS (solo si KALI_TTS_PROVIDER=qwen3*) ──
      - KALI_QWEN_BACKEND=${KALI_QWEN_BACKEND:-CPU}
      - KALI_QWEN_PORT=${KALI_QWEN_PORT:-8870}

      # ── LLM ──
      - KALI_LLM_PROVIDER=${KALI_LLM_PROVIDER:-direct}
      - KALI_LLM_API_URL=${KALI_LLM_API_URL:-}
      - KALI_LLM_API_KEY=${KALI_LLM_API_KEY:-}
      - KALI_LLM_MODEL=${KALI_LLM_MODEL:-}

      # ── Permissions ──
      - KALI_PROFILE=${KALI_PROFILE:-dev}

      # ── Kali Toys / Game AI ──
      - KALI_GAME_SESSION_PATH=${KALI_GAME_SESSION_PATH:-}
      - KALI_GAME_AI_GLOBAL_TIMEOUT_MS=${KALI_GAME_AI_GLOBAL_TIMEOUT_MS:-20000}
      - KALI_GAME_CONNECTION_ID=${KALI_GAME_CONNECTION_ID:-active}
      - KALI_GAME_MODEL=${KALI_GAME_MODEL:-}
      - KALI_GAME_TEMPERATURE=${KALI_GAME_TEMPERATURE:-0.7}
      - KALI_GAME_MAX_TOKENS=${KALI_GAME_MAX_TOKENS:-256}
      - KALI_GAME_RETRY_TIMEOUTS=${KALI_GAME_RETRY_TIMEOUTS:-12000,3000,2000}
      - KALI_GAME_MAX_RETRIES=${KALI_GAME_MAX_RETRIES:-2}

      # ── PulseAudio ──
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native

    # Audio device access
    devices:
      - /dev/snd:/dev/snd

    # Bridge network + host access (Ollama, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  kali-data:
    name: kali-data
